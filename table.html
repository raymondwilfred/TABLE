<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <link rel="stylesheet" href="table.css">
</head>
<body>
    <table border="1">
      
  <thead>
    <tr class="aa">
      
      <th rowspan="3">Day</th>
      <th colspan="3"> Workshop</th>
  
    </tr>
    <tr>
      <th colspan="2">Schedule</th>
      <th rowspan="2">Topic</th>
    </tr>
    <tr>
      
      <th>Begin</th>
      <th>End</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td rowspan="2" >Friday</td>
      <td>9:00am</td>
      <td>1pm</td>
      <td>HTML</td>
    </tr>
    <tr>
      <td>2pm</td>
      <td>5:30pm</td>
      <td>CSS</td>
    </tr>
  <tr>
      <td rowspan="2" >Saturday</td>
      <td>9:00am</td>
      <td>1pm</td>
      <td rowspan="2">JS and React Basics</td>
    </tr>
    <tr>
      <td>2pm</td>
      <td>5:30pm</td>
    </tr>
    <tr>
      <td>Sunday</td>
      <td>9:00am</td>
      <td>5:30pm</td>
      <td>Let's Build Foodie</td>
    </tr>
  </tbody>
    </table>
</body>
</html>
